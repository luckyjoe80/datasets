name: Execute Local Shell Script

on:
  workflow_dispatch:  # Allows manual triggering

jobs:
  run-bash-task:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Download the code from the repo onto the runner
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Ensure the script is executable (important for Linux runners)
      - name: Grant Execute Permissions
        run: chmod +x ./scripts/my-script.sh

      # Step 3: Run the script
      - name: Run Bash Script
        run: ./scripts/my-script.sh
