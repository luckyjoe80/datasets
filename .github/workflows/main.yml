name: Manual System Health Check

# This is the "magic" line that enables the manual button in the UI
on:
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'info'
        type: choice
        options:
          - info
          - warning
          - debug
      environment:
        description: 'Environment to check'
        required: true
        default: 'production'

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Manual Task
        run: |
          echo "Starting manual health check for ${{ github.event.inputs.environment }}..."
          echo "Setting log level to ${{ github.event.inputs.logLevel }}."
          # Add your actual commands here, like a Python script or a curl command
          date
